<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점프하는 북극곰 (입체 3D 피 효과)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #jumpBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #ffaa00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #jumpBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: white;
            font-family: sans-serif;
            z-index: 5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">북극곰을 부르는 중...</div>
    <button id="jumpBtn" style="display: none;">JUMP!</button>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 1. 씬, 카메라, 렌더러 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 11); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(20, 20);
        scene.add(gridHelper);

        // 2. 조명 설정 (빛이 강해야 3D 질감이 잘 살아납니다)
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 전역 변수 선언 ---
        let bearObject; 
        let mixer;
        let jumpAction;
        let clickCount = 0; 
        let bearHeight = 0;
        let bearWidth = 0;

        let bloodDrops = [];
        let isBleedingHead = false;
        let isBleedingHands = false;
        let headBloodTimer = 0;
        let handBloodTimer = 0;

        let headPos = new THREE.Vector3();
        let handLPos = new THREE.Vector3();
        let handRPos = new THREE.Vector3();

        let glaciers = [];
        let glaciersActive = false;
        let glacierHit = false;

        // ★ 변경점 1: 반짝이는 3D 입체 재질(Phong) 및 핏빛 색상 디테일화
        const bloodMat = new THREE.MeshPhongMaterial({ 
            color: 0x990000,       // 진한 피 색상
            specular: 0xffffff,    // 반사광 색상 (흰색 하이라이트)
            shininess: 100         // 반짝임 강도 (높을수록 촉촉하고 매끄러운 3D 느낌)
        }); 
        const bloodGeo = new THREE.SphereGeometry(0.06, 16, 16); // 디테일을 높여 더 둥글게

        // ★ 변경점 2: 3D 포물선 수평/수직 분사 로직
        function spawnBloodDrop(originPosition, forceType) {
            const mesh = new THREE.Mesh(bloodGeo, bloodMat);
            mesh.position.copy(originPosition);
            
            // 입체감을 위한 랜덤 크기 부여 (0.5배 ~ 1.5배)
            const randomScale = 0.5 + Math.random() * 1.0;
            mesh.scale.setScalar(randomScale);
            
            scene.add(mesh);

            // 3D 공간(원형) 사방으로 퍼지기 위한 각도 계산
            const angle = Math.random() * Math.PI * 2;
            const spreadForce = 0.3 + Math.random() * 0.7; // 사방으로 튕겨나가는 힘
            
            let velocity = new THREE.Vector3();

            if (forceType === 'head') {
                // 머리: 분수처럼 위쪽(+Y) 및 사방(X, Z)으로 뿜어짐
                velocity.set(
                    Math.cos(angle) * spreadForce * 0.6,
                    1.5 + Math.random() * 1.5, // 위로 솟구치는 힘 생성
                    Math.sin(angle) * spreadForce * 0.6
                );
            } else {
                // 손: 양옆 앞쪽으로 툭툭 튀며 떨어짐
                velocity.set(
                    Math.cos(angle) * spreadForce * 1.2,
                    0.5 + Math.random() * 1.0, 
                    Math.sin(angle) * spreadForce * 1.2
                );
            }

            bloodDrops.push({
                mesh: mesh,
                velocity: velocity,
                life: 1.0 
            });
        }

        // 3. FBX 모델 불러오기
        const loader = new FBXLoader();
        loader.load('Jump.fbx', function (object) {
            bearObject = object;
            
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim;
            object.scale.set(scale, scale, scale);
            
            const newBox = new THREE.Box3().setFromObject(object);
            const center = newBox.getCenter(new THREE.Vector3());
            object.position.set(-center.x, -newBox.min.y, -center.z);

            scene.add(object);

            bearHeight = newBox.max.y - newBox.min.y;
            bearWidth = newBox.max.x - newBox.min.x;

            // 상처 좌표 미세 조정
            headPos.set(0, bearHeight * 0.88, bearHeight * 0.05);
            handLPos.set(-bearWidth * 0.23, bearHeight * 0.38, bearHeight * 0.3);
            handRPos.set(bearWidth * 0.23, bearHeight * 0.38, bearHeight * 0.3);

            mixer = new THREE.AnimationMixer(object);
            if (object.animations && object.animations.length > 0) {
                jumpAction = mixer.clipAction(object.animations[0]);
                jumpAction.setLoop(THREE.LoopOnce, 1);
                jumpAction.clampWhenFinished = true;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('jumpBtn').style.display = 'block';
        });

        // 빙하 생성 함수
        function spawnGlaciers() {
            glaciers.forEach(g => scene.remove(g));
            glaciers = [];

            const glacierMat = new THREE.MeshStandardMaterial({ color: 0xe0ffff, roughness: 0.2, flatShading: true });
            const glacierGeo = new THREE.IcosahedronGeometry(0.6, 0); 

            const count = 6; 
            const radius = 15; 

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const glacier = new THREE.Mesh(glacierGeo, glacierMat);
                
                glacier.position.x = Math.cos(angle) * radius;
                glacier.position.z = Math.sin(angle) * radius;
                glacier.position.y = bearHeight * 0.4; 

                scene.add(glacier);
                glaciers.push(glacier);
            }
            glaciersActive = true;
            glacierHit = false;
        }

        // 4. 버튼 클릭 이벤트
        document.getElementById('jumpBtn').addEventListener('click', () => {
            clickCount++;

            if (clickCount === 1) {
                isBleedingHead = true;
                if (jumpAction) jumpAction.reset().play();
            } 
            else if (clickCount === 2) {
                isBleedingHands = true;
                if (jumpAction) jumpAction.reset().play();
            } 
            else if (clickCount >= 3) {
                spawnGlaciers();
            }
        });

        // 5. 애니메이션 루프
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            // 머리 피 스폰
            if (isBleedingHead) {
                headBloodTimer += delta;
                if (headBloodTimer > 0.03) { // 스폰 속도 소폭 상향
                    spawnBloodDrop(headPos, 'head');
                    headBloodTimer = 0;
                }
            }

            // 양 손 피 스폰
            if (isBleedingHands) {
                handBloodTimer += delta;
                if (handBloodTimer > 0.04) {
                    spawnBloodDrop(handLPos, 'hands');
                    spawnBloodDrop(handRPos, 'hands');
                    handBloodTimer = 0;
                }
            }

            // 핏방울 물리 연산 (중력 + 3D 공간 이동)
            for (let i = bloodDrops.length - 1; i >= 0; i--) {
                const drop = bloodDrops[i];
                
                // 중력 효과 (Y축 속도를 계속 깎음)
                drop.velocity.y -= 9.8 * delta; 
                
                // 3차원 위치 이동 (X, Y, Z 모두 반영됨)
                drop.mesh.position.addScaledVector(drop.velocity, delta);
                
                // 수명 및 크기 디졸브
                drop.life -= delta * 0.7; 
                if (drop.life > 0) {
                    // 원래 무작위 크기 대비 실시간 축소 연산
                    drop.mesh.scale.setScalar(drop.life * (drop.mesh.scale.x / drop.life)); 
                }

                // 소멸 조건 (바닥에 닿거나 수명이 다하면 제거)
                if (drop.mesh.position.y <= 0.02 || drop.life <= 0) {
                    scene.remove(drop.mesh);
                    bloodDrops.splice(i, 1);
                }
            }

            // 빙하 이동 및 충돌
            if (glaciersActive) {
                let checkHit = false;
                const targetPos = new THREE.Vector3(0, bearHeight * 0.4, 0); 

                glaciers.forEach(glacier => {
                    const dir = new THREE.Vector3().subVectors(targetPos, glacier.position).normalize();
                    glacier.position.addScaledVector(dir, delta * 8); 

                    const dist = glacier.position.distanceTo(targetPos);
                    if (dist < 0.8) { 
                        checkHit = true;
                    }
                });

                if (checkHit && !glacierHit) {
                    glacierHit = true;
                    glaciersActive = false; 

                    glaciers.forEach(g => scene.remove(g));
                    glaciers = [];

                    if (jumpAction) {
                        jumpAction.reset().play();
                    }
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
