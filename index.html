<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점프하는 북극곰 (FBX)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #jumpBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #ffaa00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #jumpBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: white;
            font-family: sans-serif;
            z-index: 5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">북극곰을 부르는 중...</div>
    <button id="jumpBtn" style="display: none;">JUMP!</button>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 1. 씬, 카메라, 렌더러 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10); // 카메라를 약간 뒤로 뺌

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 바닥을 알아보기 쉽게 그리드(격자) 추가
        const gridHelper = new THREE.GridHelper(20, 20);
        scene.add(gridHelper);

        // 2. 조명 설정
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        let mixer;
        let jumpAction;

        // 3. FBX 모델 불러오기 및 자동 크기 조절
        const loader = new FBXLoader();
        loader.load('Jump.fbx', function (object) {
            
            // ★ 핵심: 모델의 실제 크기를 측정해서 화면에 딱 맞게 자동 조절하는 마법의 코드
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            
            // 모델의 가장 긴 쪽의 길이가 4가 되도록 비율을 맞춤
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim;
            object.scale.set(scale, scale, scale);
            
            // 크기 조절 후, 발바닥이 바닥(y=0)에 닿도록 위치 다시 잡기
            const newBox = new THREE.Box3().setFromObject(object);
            const center = newBox.getCenter(new THREE.Vector3());
            object.position.set(-center.x, -newBox.min.y, -center.z);

            scene.add(object);

            // 애니메이션 설정
            mixer = new THREE.AnimationMixer(object);
            if (object.animations && object.animations.length > 0) {
                jumpAction = mixer.clipAction(object.animations[0]);
                jumpAction.setLoop(THREE.LoopOnce, 1);
                jumpAction.clampWhenFinished = true;
            }

            // 로딩이 끝나면 '부르는 중' 글자를 숨기고 JUMP 버튼을 표시
            document.getElementById('loading').style.display = 'none';
            document.getElementById('jumpBtn').style.display = 'block';
            
        });

        // 4. 점프 버튼 클릭 이벤트
        document.getElementById('jumpBtn').addEventListener('click', () => {
            if (jumpAction) {
                jumpAction.reset();
                jumpAction.play();
            }
        });

        // 5. 화면 업데이트 (애니메이션 루프)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        // 브라우저 창 크기가 바뀔 때 카메라 비율 맞추기
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
