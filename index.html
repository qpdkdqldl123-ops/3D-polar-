<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점프하는 북극곰 (이벤트 추가)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #jumpBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #ffaa00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #jumpBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: white;
            font-family: sans-serif;
            z-index: 5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">북극곰을 부르는 중...</div>
    <button id="jumpBtn" style="display: none;">JUMP!</button>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 1. 씬, 카메라, 렌더러 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 11); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(20, 20);
        scene.add(gridHelper);

        // 2. 조명 설정
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 전역 변수 선언 ---
        let bearObject; 
        let mixer;
        let jumpAction;
        let clickCount = 0; 
        let bearHeight = 0;
        let bearWidth = 0;

        // ★ 자연스러운 피 효과를 위한 파티클 시스템 변수들
        let bloodDrops = [];
        let isBleedingHead = false;
        let isBleedingHands = false;
        let headBloodTimer = 0;
        let handBloodTimer = 0;

        let headPos = new THREE.Vector3();
        let handLPos = new THREE.Vector3();
        let handRPos = new THREE.Vector3();

        // 빙하 효과를 위한 변수
        let glaciers = [];
        let glaciersActive = false;
        let glacierHit = false;

        // 피 재질 및 기본 도형 설정 (진한 피 색상)
        const bloodMat = new THREE.MeshBasicMaterial({ color: 0xb30000 }); 
        const bloodGeo = new THREE.SphereGeometry(0.05, 8, 8); // 아주 작은 구체 형태의 핏방울

        // 핏방울 개별 스폰 함수
        function spawnBloodDrop(originPosition) {
            const mesh = new THREE.Mesh(bloodGeo, bloodMat);
            
            // 자연스러움을 위해 생성 위치에 아주 미세한 무작위 오차 부여
            mesh.position.copy(originPosition);
            mesh.position.x += (Math.random() - 0.5) * 0.15;
            mesh.position.y += (Math.random() - 0.5) * 0.05;
            mesh.position.z += (Math.random() - 0.5) * 0.15;
            
            scene.add(mesh);

            // 초기 속도 설정 (좌우전후로 아주 살짝 퍼지면서 기본적으로 아래로 떨어지게 시작)
            const velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.3,
                -0.2 - Math.random() * 0.5, 
                (Math.random() - 0.5) * 0.3
            );

            // 배열에 저장하여 실시간으로 위치 추적
            bloodDrops.push({
                mesh: mesh,
                velocity: velocity,
                life: 1.0 // 핏방울의 생명력 수치 (시간이 지나면서 깎임)
            });
        }

        // 3. FBX 모델 불러오기 및 자동 크기 조절
        const loader = new FBXLoader();
        loader.load('Jump.fbx', function (object) {
            bearObject = object;
            
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim;
            object.scale.set(scale, scale, scale);
            
            const newBox = new THREE.Box3().setFromObject(object);
            const center = newBox.getCenter(new THREE.Vector3());
            object.position.set(-center.x, -newBox.min.y, -center.z);

            scene.add(object);

            bearHeight = newBox.max.y - newBox.min.y;
            bearWidth = newBox.max.x - newBox.min.x;

            // 상처 부위 기준 좌표 계산 (머리, 왼손, 오른손)
            headPos.set(0, bearHeight * 0.85, bearHeight * 0.1);
            handLPos.set(-bearWidth * 0.23, bearHeight * 0.38, bearHeight * 0.3);
            handRPos.set(bearWidth * 0.23, bearHeight * 0.38, bearHeight * 0.3);

            // 애니메이션 설정
            mixer = new THREE.AnimationMixer(object);
            if (object.animations && object.animations.length > 0) {
                jumpAction = mixer.clipAction(object.animations[0]);
                jumpAction.setLoop(THREE.LoopOnce, 1);
                jumpAction.clampWhenFinished = true;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('jumpBtn').style.display = 'block';
        });

        // 빙하 무리 생성 함수
        function spawnGlaciers() {
            glaciers.forEach(g => scene.remove(g));
            glaciers = [];

            const glacierMat = new THREE.MeshStandardMaterial({ color: 0xe0ffff, roughness: 0.2, flatShading: true });
            const glacierGeo = new THREE.IcosahedronGeometry(0.6, 0); 

            const count = 6; 
            const radius = 15; 

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const glacier = new THREE.Mesh(glacierGeo, glacierMat);
                
                glacier.position.x = Math.cos(angle) * radius;
                glacier.position.z = Math.sin(angle) * radius;
                glacier.position.y = bearHeight * 0.4; 

                scene.add(glacier);
                glaciers.push(glacier);
            }
            glaciersActive = true;
            glacierHit = false;
        }

        // 4. 점프 버튼 클릭 이벤트 핸들러
        document.getElementById('jumpBtn').addEventListener('click', () => {
            clickCount++;

            if (clickCount === 1) {
                isBleedingHead = true;
                if (jumpAction) jumpAction.reset().play();
            } 
            else if (clickCount === 2) {
                isBleedingHands = true;
                if (jumpAction) jumpAction.reset().play();
            } 
            else if (clickCount >= 3) {
                spawnGlaciers();
            }
        });

        // 5. 화면 업데이트 (애니메이션 루프)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            // [실시간 연출 1] 머리 피 뚝뚝 타이머 작동 및 스폰
            if (isBleedingHead) {
                headBloodTimer += delta;
                if (headBloodTimer > 0.04) { // 0.04초 간격으로 연속 스폰
                    spawnBloodDrop(headPos);
                    headBloodTimer = 0;
                }
            }

            // [실시간 연출 2] 양 손 피 뚝뚝 타이머 작동 및 스폰
            if (isBleedingHands) {
                handBloodTimer += delta;
                if (handBloodTimer > 0.06) {
                    spawnBloodDrop(handLPos);
                    spawnBloodDrop(handRPos);
                    handBloodTimer = 0;
                }
            }

            // ★ [핏방울 물리 시뮬레이션 핵심 로직]
            for (let i = bloodDrops.length - 1; i >= 0; i--) {
                const drop = bloodDrops[i];
                
                // 1. 중력 효과: y축 속도를 매 순간 아래쪽으로 누적 감속
                drop.velocity.y -= 12 * delta; 
                
                // 2. 물리 이동: 누적된 속도 벡터 방향으로 메쉬 좌표 이동
                drop.mesh.position.addScaledVector(drop.velocity, delta);
                
                // 3. 표면장력/증발 연출: 수명을 줄이고 그에 따라 크기를 작게 만듬
                drop.life -= delta * 0.8; 
                if (drop.life > 0) {
                    drop.mesh.scale.setScalar(drop.life); 
                }

                // 4. 메모리 관리: 바닥(그리드)에 완전히 닿았거나 수명이 다한 방울은 삭제
                if (drop.mesh.position.y <= 0.02 || drop.life <= 0) {
                    scene.remove(drop.mesh);
                    bloodDrops.splice(i, 1);
                }
            }

            // [실시간 연출 3] 빙하 이동 및 충돌 감지
            if (glaciersActive) {
                let checkHit = false;
                const targetPos = new THREE.Vector3(0, bearHeight * 0.4, 0); 

                glaciers.forEach(glacier => {
                    const dir = new THREE.Vector3().subVectors(targetPos, glacier.position).normalize();
                    glacier.position.addScaledVector(dir, delta * 8); 

                    const dist = glacier.position.distanceTo(targetPos);
                    if (dist < 0.8) { 
                        checkHit = true;
                    }
                });

                if (checkHit && !glacierHit) {
                    glacierHit = true;
                    glaciersActive = false; 

                    glaciers.forEach(g => scene.remove(g));
                    glaciers = [];

                    if (jumpAction) {
                        jumpAction.reset().play();
                    }
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
