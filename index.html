<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점프하는 북극곰 (이벤트 추가)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #jumpBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #ffaa00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #jumpBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: white;
            font-family: sans-serif;
            z-index: 5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">북극곰을 부르는 중...</div>
    <button id="jumpBtn" style="display: none;">JUMP!</button>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 1. 씬, 카메라, 렌더러 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 11); // 빙하를 더 잘 보기 위해 카메라를 살짝 뒤/위로 조정

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 바닥을 알아보기 쉽게 그리드(격자) 추가
        const gridHelper = new THREE.GridHelper(20, 20);
        scene.add(gridHelper);

        // 2. 조명 설정
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 기능 확장을 위한 전역 변수 선언 ---
        let mixer;
        let jumpAction;
        let clickCount = 0; // 버튼 클릭 횟수 체크
        let bearHeight = 0;
        let bearWidth = 0;

        // 피 효과를 위한 변수
        let bloodHead;
        let bloodHandL, bloodHandR;
        let isBleedingHead = false;
        let isBleedingHands = false;

        // 빙하 효과를 위한 변수
        let glaciers = [];
        let glaciersActive = false;
        let glacierHit = false;

        // 3. FBX 모델 불러오기 및 자동 크기 조절
        const loader = new FBXLoader();
        loader.load('Jump.fbx', function (object) {
            
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim;
            object.scale.set(scale, scale, scale);
            
            const newBox = new THREE.Box3().setFromObject(object);
            const center = newBox.getCenter(new THREE.Vector3());
            object.position.set(-center.x, -newBox.min.y, -center.z);

            scene.add(object);

            // 모델 크기 기반으로 이펙트 위치 잡기 위해 크기 저장
            bearHeight = newBox.max.y - newBox.min.y;
            bearWidth = newBox.max.x - newBox.min.x;

            // [이펙트 생성] 피(Blood) 메쉬 생성 및 배치
            const bloodMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            // 머리 피 (곰 머리 위쪽 좌표 계산)
            const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
            bloodHead = new THREE.Mesh(headGeo, bloodMat);
            bloodHead.position.set(0, bearHeight * 0.85, bearHeight * 0.1);
            bloodHead.scale.set(0, 0, 0); // 처음엔 크기 0
            scene.add(bloodHead);

            // 양 손 피 (앞쪽 양옆 좌표 계산)
            const handGeo = new THREE.SphereGeometry(0.2, 16, 16);
            bloodHandL = new THREE.Mesh(handGeo, bloodMat);
            bloodHandR = new THREE.Mesh(handGeo, bloodMat);
            bloodHandL.position.set(-bearWidth * 0.25, bearHeight * 0.35, bearHeight * 0.3);
            bloodHandR.position.set(bearWidth * 0.25, bearHeight * 0.35, bearHeight * 0.3);
            bloodHandL.scale.set(0, 0, 0);
            bloodHandR.scale.set(0, 0, 0);
            scene.add(bloodHandL);
            scene.add(bloodHandR);

            // 애니메이션 설정
            mixer = new THREE.AnimationMixer(object);
            if (object.animations && object.animations.length > 0) {
                jumpAction = mixer.clipAction(object.animations[0]);
                jumpAction.setLoop(THREE.LoopOnce, 1);
                jumpAction.clampWhenFinished = true;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('jumpBtn').style.display = 'block';
            
        });

        // 빙하 무리 생성 함수
        function spawnGlaciers() {
            // 기존에 남아있던 빙하가 있다면 제거
            glaciers.forEach(g => scene.remove(g));
            glaciers = [];

            const glacierMat = new THREE.MeshStandardMaterial({ color: 0xe0ffff, roughness: 0.2, flatShading: true });
            const glacierGeo = new THREE.IcosahedronGeometry(0.6, 0); // 각진 빙하 모양

            const count = 6; // 날아올 빙하 개수
            const radius = 15; // 생성될 원의 반지름 (멀리서 생성)

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const glacier = new THREE.Mesh(glacierGeo, glacierMat);
                
                // 북극곰을 중심으로 원형 배열
                glacier.position.x = Math.cos(angle) * radius;
                glacier.position.z = Math.sin(angle) * radius;
                glacier.position.y = bearHeight * 0.4; // 북극곰 몸통 높이 맞춤

                scene.add(glacier);
                glaciers.push(glacier);
            }
            glaciersActive = true;
            glacierHit = false;
        }

        // 4. 점프 버튼 클릭 이벤트 핸들러 변경
        document.getElementById('jumpBtn').addEventListener('click', () => {
            clickCount++;

            if (clickCount === 1) {
                // 1번째 클릭: 머리에 피가 점점 차오름 + 점프
                isBleedingHead = true;
                if (jumpAction) {
                    jumpAction.reset().play();
                }
            } 
            else if (clickCount === 2) {
                // 2번째 클릭: 손에 피가 남 + 점프
                isBleedingHands = true;
                if (jumpAction) {
                    jumpAction.reset().play();
                }
            } 
            else if (clickCount >= 3) {
                // 3번째 클릭 이후: 가만히 있다가 빙하가 날아옴 (충돌 시 점프)
                spawnGlaciers();
            }
        });

        // 5. 화면 업데이트 (애니메이션 루프)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            // [실시간 연출 1] 머리 피 증가 애니메이션
            if (isBleedingHead && bloodHead) {
                if (bloodHead.scale.x < 2.0) { // 원하는 최대 크기까지 서서히 증가
                    bloodHead.scale.addScalar(delta * 0.6);
                }
            }

            // [실시간 연출 2] 손 피 증가 애니메이션
            if (isBleedingHands && bloodHandL && bloodHandR) {
                if (bloodHandL.scale.x < 1.5) {
                    bloodHandL.scale.addScalar(delta * 0.8);
                    bloodHandR.scale.addScalar(delta * 0.8);
                }
            }

            // [실시간 연출 3] 빙하 이동 및 충돌 감지
            if (glaciersActive) {
                let checkHit = false;
                const targetPos = new THREE.Vector3(0, bearHeight * 0.4, 0); // 북극곰 중심 타겟

                glaciers.forEach(glacier => {
                    // 북극곰을 향하는 방향 벡터 계산
                    const dir = new THREE.Vector3().subVectors(targetPos, glacier.position).normalize();
                    glacier.position.addScaledVector(dir, delta * 8); // 속도: 8

                    // 거리 측정으로 충돌 여부 확인
                    const dist = glacier.position.distanceTo(targetPos);
                    if (dist < 0.8) { 
                        checkHit = true;
                    }
                });

                // 빙하가 곰에게 닿은 순간 처리
                if (checkHit && !glacierHit) {
                    glacierHit = true;
                    glaciersActive = false; // 이동 중지

                    // 빙하들 제거
                    glaciers.forEach(g => scene.remove(g));
                    glaciers = [];

                    // 충돌했을 때 비로소 점프 작동!
                    if (jumpAction) {
                        jumpAction.reset().play();
                    }
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // 브라우저 창 크기가 바뀔 때 카메라 비율 맞추기
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
